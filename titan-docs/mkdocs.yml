repo_name: ramn51/titan-orchestrator
repo_url: https://github.com/ramn51/titan-orchestrator
site_name: Titan Orchestrator
site_description: A lightweight distributed execution runtime for DAGs, Agents, and Services.
theme:
  name: material
  logo: screenshots/Titan_logo.png
  favicon: screenshots/Titan_logo.png
  font:
    text: Roboto
    code: Roboto Mono
  palette:
    # High-contrast Slate/Dark Mode
    - scheme: slate
      primary: light green          
      accent: light green
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.code.annotate
# theme:
#   name: material
#   palette:
#     scheme: slate # Sleek dark mode
#     primary: light green
#     accent: teal
#   features:
#     - navigation.tabs # Puts top-level items in a top navbar

extra_css:
  - stylesheets/titan.css

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - pymdownx.blocks.caption
  - pymdownx.tasklist:
      custom_checkbox: false
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - Home: index.md
  - Getting Started: getting-started.md

  - Defining Pipelines:
      - YAML Pipelines: examples/yaml.md
      - Python SDK: reference/sdk.md
      - Visual Constructor: constructor/overview.md
      - MCP (Natural Language): mcp/overview.md

  - Dashboard:
      - DAG Visualizer: visualizer/overview.md
      - Monitoring & Logs: visualizer/monitoring.md
      - HITL Approval: visualizer/hitl-approval.md
      - Workspace Files: visualizer/workspace-files.md
      - Agent Runs: visualizer/agent-runs.md
      - DAG Constructor:
          - Overview: constructor/overview.md
          - Building DAGs: constructor/building-dags.md
          - HITL Gates: constructor/hitl.md
          - Managing DAGs: constructor/managing-dags.md
          - Keyboard Shortcuts: constructor/keyboard-shortcuts.md

  - Examples:
      - Overview: examples/agentic.md
      - Pipelines:
          - Static Pipelines (YAML): examples/yaml.md
          - Parallel Analyst Pipeline: examples/comp-intel-pipeline.md
          - Dagster Integration: examples/dagster.md
      - Agentic:
          - Build Your First Agent (10 min): examples/quickstart-agent.md
          - Research Agent: examples/research-agent.md
          - Code Generation Agent: examples/code-gen-agent.md
          - Human-in-the-Loop (HITL): examples/hitl.md
          - Multi-Agent Research Pipeline: examples/research-pipeline.md
      - Advanced:
          - Titan CI Pipeline (Dogfooding): examples/titan-ci.md

  - Deployment:
      - Multi-VM Cloud Setup: deployment/cloud.md
      - Remote GPU Worker (SSH Tunnel): deployment/remote-gpu-worker.md

  - API Reference:
      - Python SDK: reference/sdk.md
      - Titan CLI: reference/cli.md
      - Titan RPC Spec: reference/rpc-spec.md
      - Java Engine API: javadocs/docs/index.html

  - Integrations:
      - MCP Server: mcp/overview.md
      - LangChain / LangGraph: integrations/langchain.md

  - Architecture:
      - System Design: architecture/design.md
      - TitanStore & IPC: architecture/internals.md
      - How Titan Compares: comparison.md

  - Contributing:
      - How to Contribute: contributing.md
      - Developer Guide: contributing-dev-guide.md

